{% extends 'tabler_base.html' %}

{% block page_title %}Federation addresses{% endblock %}

{% block content %}
<form method="post" class="mb-4">
    <input type="hidden" name="action" value="create">
    <div class="row g-3 align-items-end">
        <div class="col-md-3">
            <label for="new-stellar-address" class="form-label required">Stellar address</label>
            <input id="new-stellar-address" name="stellar_address" class="form-control"
                   placeholder="alice*eurmtl.me" required>
        </div>
        <div class="col-md-6">
            <label for="new-account-id" class="form-label required">Account ID</label>
            <input id="new-account-id" name="account_id" class="form-control"
                   placeholder="G..." maxlength="56" required>
        </div>
        <div class="col-md-2">
            <label for="new-memo" class="form-label">Memo</label>
            <input id="new-memo" name="memo" class="form-control" maxlength="32">
        </div>
        <div class="col-md-1">
            <button type="submit" class="btn btn-primary w-100" data-bs-toggle="tooltip" title="Add address">
                <i class="ti ti-plus"></i>
            </button>
        </div>
    </div>
</form>

<div class="table-responsive">
    <table class="table table-vcenter">
        <thead>
        <tr>
            <th>Stellar address</th>
            <th>Account ID</th>
            <th>Memo</th>
            <th class="w-1"></th>
        </tr>
        </thead>
        <tbody>
        {% for address in addresses %}
        <tr>
            <td colspan="4">
                <form method="post">
                    <input type="hidden" name="id" value="{{ address.id }}">
                    <div class="row g-2 align-items-center">
                        <div class="col-md-3">
                            <input name="stellar_address" class="form-control"
                                   value="{{ address.stellar_address }}" required>
                        </div>
                        <div class="col-md-6">
                            <input name="account_id" class="form-control"
                                   value="{{ address.account_id }}" maxlength="56" required>
                        </div>
                        <div class="col-md-2">
                            <input name="memo" class="form-control" value="{{ address.memo or '' }}" maxlength="32">
                        </div>
                        <div class="col-md-1 d-flex gap-2">
                            <button type="submit" name="action" value="update" class="btn btn-icon btn-primary"
                                    data-bs-toggle="tooltip" title="Save">
                                <i class="ti ti-device-floppy"></i>
                            </button>
                            <button type="submit" name="action" value="delete" class="btn btn-icon btn-danger"
                                    data-bs-toggle="tooltip" title="Delete">
                                <i class="ti ti-trash"></i>
                            </button>
                        </div>
                    </div>
                </form>
            </td>
        </tr>
        {% else %}
        <tr>
            <td colspan="4" class="text-secondary">No federation addresses.</td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
